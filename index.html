<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Generator | JS prject</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    </head>

    <body>
        <div class="container">
            <h1>Password Generator</h1>
            <div class="inputBox">
                <input type="text" class="passbox" id="passbox" disabled>

                <span id="copy" class="material-symbols-outlined">
                    content_copy
                </span>
            </div>


            <!-- slider -->
            <input class="slider" id="slider" type="range" min="1" max="30" value="8">

            <!-- to show password length -->
            <div class="row">
                <p>Password length</p>
                <span id="PassLength">8</span>
            </div>

            <div class="row">
                <label for="lowercase">Include lowercase (a-z)</label>
                <input type="checkbox" name="lowercase" id="lowercase" checked />
            </div>

            <div class="row">
                <label for="uppercase">Include Uppercase (A-Z)</label>
                <input type="checkbox" name="uppercase" id="uppercase" checked>
            </div>

            <div class="row">
                <label for="number">Include Numbers (0-9)</label>
                <input type="checkbox" name="number" id="number" checked>
            </div>

            <div class="row">
                <label for="Symbol">Include Symbol (! - +)</label>
                <input type="checkbox" name="Symbol" id="Symbol" checked>
            </div>
            <button type="button" id="Btn">Generate Password
            </button>
        </div>

        <script src="script.js"></script>
    </body>

</html>
